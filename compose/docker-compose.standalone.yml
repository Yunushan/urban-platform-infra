version: '3.9'
name: urban-platform-infra-standalone

services:
  nginx:
    image: ${STANDALONE_NGINX_IMAGE:-nginxinc/nginx-unprivileged:1.30.2}
    ports:
    - "${STANDALONE_BIND_IP:-0.0.0.0}:${STANDALONE_HTTPS_PORT:-443}:8443"
    volumes:
    - "${STANDALONE_RUNTIME_DIR:-.standalone}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
    - "${STANDALONE_RUNTIME_DIR:-.standalone}/tls:/etc/nginx/tls:ro"
