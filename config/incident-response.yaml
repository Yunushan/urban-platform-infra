controller:
  report: reports/incident-response-plan.md
  overrides: reports/incident-response-values.yaml
supportedIntegrations:
  - none
  - prometheus-alertmanager
  - grafana-oncall
  - pagerduty
  - opsgenie
  - slack
  - teams
requiredChecks:
  - alert route ownership reviewed
  - service ownership and runbook index reviewed
  - escalation rota and paging coverage reviewed before production use
  - rollback and restore paths reviewed
  - communication template reviewed
  - incident drill and post-incident review evidence reviewed
guardrails:
  - keep incident response automation disabled by default in committed values
  - do not commit contact names, phone numbers, email addresses, pager service IDs, ticket URLs, or incident timelines
  - do not page, notify, or open tickets from public-safe planning commands
  - store private incident evidence only in approved incident-management or evidence systems
  - keep production paging and regulatory reporting owned by private overlays and approved integrations
