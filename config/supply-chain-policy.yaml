policy:
  nodeLtsMajor: 24
  releaseIntegrity:
    requireChartVersionMatchesTag: true
    requireChecksums: true
    requireSbom: true
    requireReleaseManifest: true
    requireGithubArtifactAttestations: true
    requireOidcForSigning: true
  releaseVerification:
    offlineVerifier: scripts/release/verify_release_evidence.py
    report: reports/release-evidence-verification.md
    verifyTagMatchesChartVersion: true
    verifyChecksumContents: true
    verifySbomJson: true
    verifyReleaseManifestJson: true
    publicSafetyScan: true
  githubActions:
    disallowFloatingRefs:
      - master
      - main
    preferFullLengthShaPins: true
    allowedTaggedActionOwners:
      - actions
      - azure
      - aquasecurity
  dependencyReview:
    enabledForPullRequests: true
    failOnSeverity: high
  releaseArtifacts:
    chartPackage: dist/urban-platform-infra-<version>.tgz
    renderedManifest: dist/rendered.yaml
    sbom: dist/urban-platform-infra.spdx.json
    releaseManifest: dist/release-evidence.json
    checksums: dist/SHA256SUMS
