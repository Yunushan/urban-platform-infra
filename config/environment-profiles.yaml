      global:
        environment: lab
        defaultReplicas: 1
        replicaOverride: 1
        skipPlaceholderWorkloads: true
        scheduling:
          topologySpread: false
          antiAffinity: preferred
      autoscaling:
        enabled: false
      backup:
        enabled: false
        profile: disabled
      gitOpsDelivery:
        enabled: false
        profile: operator-managed
        controller: none
        reconciliation: manual
        driftDetection: report-only
        prune: false
        selfHeal: false
      progressiveDelivery:
        enabled: false
        profile: lab-canary
        strategy: canary
        controller: native
        trafficProvider: native
      scalingPolicy:
        enabled: false
        profile: lab-rightsize
