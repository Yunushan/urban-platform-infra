      changeManagement:
        enabled: false
        profile: lab-change
        mode: lab
      cutoverGates:
        enabled: false
        profile: lab-smoke
        mode: lab
      smokeTesting:
        enabled: false
        profile: lab-smoke
        mode: lab
      releaseRunbook:
        enabled: false
        profile: lab-release
        mode: lab
      clusterUpgrade:
        enabled: false
        profile: lab-upgrade
        mode: lab
      disasterRecovery:
        enabled: false
        profile: lab-dr
