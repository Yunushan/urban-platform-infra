defaultProfile: disabled
profiles:
  disabled:
    description: No secret provider resources are rendered by default.
    provider: none
    enabledByDefault: false
    automaticImport: false
    rendersPlainKubernetesSecrets: false
    requiresOperator: false
  kubernetes-direct:
    description: Operator-approved direct Kubernetes Secret import for lab or emergency migration.
    provider: kubernetes
    enabledByDefault: false
    automaticImport: true
    rendersPlainKubernetesSecrets: true
    requiresOperator: false
    requiredGate: MIGRATION_ALLOW_SECRET_MATERIAL=true
  external-secrets:
    description: External Secrets Operator pulls runtime values from a managed provider.
    provider: external-secrets
    enabledByDefault: false
    automaticImport: true
    rendersPlainKubernetesSecrets: false
    requiresOperator: true
    requiredOperator: external-secrets-operator
    defaultSecretStoreKind: ClusterSecretStore
    defaultSecretStoreName: vault
    defaultRemotePrefix: example/urban-platform/import
  vault:
    description: Vault-backed External Secrets profile for enterprise runtime secrets.
    provider: vault
    enabledByDefault: false
    automaticImport: true
    rendersPlainKubernetesSecrets: false
    requiresOperator: true
    requiredOperator: external-secrets-operator
    defaultSecretStoreKind: ClusterSecretStore
    defaultSecretStoreName: vault
    defaultRemotePrefix: example/urban-platform/import
  sops:
    description: Git-encrypted secret files with SOPS and age.
    provider: sops
    enabledByDefault: false
    automaticImport: false
    rendersPlainKubernetesSecrets: false
    requiresOperator: false
    encryptedPath: secrets/
    handoff: private encrypted file generation outside Git history
  sealed-secrets:
    description: Bitnami Sealed Secrets for GitOps-managed encrypted Secret manifests.
    provider: sealed-secrets
    enabledByDefault: false
    automaticImport: false
    rendersPlainKubernetesSecrets: false
    requiresOperator: true
    requiredOperator: sealed-secrets-controller
    handoff: kubeseal against the target cluster public certificate
migration:
  defaultProvider: kubernetes
  automaticProviders:
  - kubernetes
  - external-secrets
  - vault
  planOnlyProviders:
  - sops
  - sealed-secrets
  directSecretGate: MIGRATION_ALLOW_SECRET_MATERIAL=true
  providerSwitch: MIGRATION_SECRET_PROVIDER
  remotePrefixSwitch: MIGRATION_SECRET_REMOTE_PREFIX
  secretStoreSwitches:
  - MIGRATION_SECRET_STORE_NAME
  - MIGRATION_SECRET_STORE_KIND
  - MIGRATION_SECRET_REFRESH_INTERVAL
policy:
  plaintextKubernetesSecretsAllowedByDefault: false
  preferAutomaticRuntimeSync: true
  recommendedProductionProvider: external-secrets
  recommendedEnterpriseProvider: vault
  keepProviderPayloadsOutOfGit: true
