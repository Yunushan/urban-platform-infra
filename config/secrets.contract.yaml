version: 1
policy:
  plaintextKubernetesSecretsAllowed: false
  commitRealSecretValues: false
  preferredDelivery:
    - external-secrets
    - sops
    - sealed-secrets
runtimeSecrets:
  registryCredentials:
    kubernetesName: registry-credentials
    type: kubernetes.io/dockerconfigjson
    required: false
    delivery: external-secrets
    description: Pull credentials for private container registries.
    remoteRef:
      key: example/city-intersection/registry/dockerconfigjson
      property: .dockerconfigjson
  ingressTls:
    kubernetesName: city-intersection-tls
    type: kubernetes.io/tls
    required: false
    delivery: cert-manager-or-external-secrets
    description: TLS material for ingress when cert-manager is not issuing it.
    remoteRef:
      key: example/city-intersection/ingress/tls
  bootstrapTokens:
    kubernetesName: ansible-vault-managed
    type: ansible-vault
    required: true
    delivery: ansible-vault-or-sops
    description: RKE2, K3s, and Keepalived bootstrap values used by Ansible.
    remoteRef:
      key: example/city-intersection/bootstrap
  databaseCredentials:
    kubernetesName: database-credentials
    type: Opaque
    required: false
    delivery: external-secrets
    description: Optional externally managed application database credentials.
    remoteRef:
      key: example/city-intersection/database
