default: disabled
defaultStack: disabled
stack:
  logging: none
  search: none
  metrics: none
  dashboards: none
  telemetry: none
  traces: none
retention:
  metrics: 30d
  logs: 30d
  traces: 7d
alerting:
  defaultSeverity: warning
  pageSeverity: critical
  route: platform-on-call
  runbooks: docs/runbooks.md
profiles:
  grafana:
    enabled: false
    purpose: dashboards
  prometheus:
    enabled: false
    purpose: metrics/SLO alerting
    provider: kube-prometheus-stack
  opentelemetry:
    enabled: false
    purpose: metrics/logs/traces collection
    mode: daemonset
  loki:
    enabled: false
    purpose: logs
    defaultRetention: 30d
  elasticsearch:
    enabled: false
    purpose: search/log analytics
    version: 9.4.1
  opensearch:
    enabled: false
    purpose: search/log analytics
  graylog:
    enabled: false
    purpose: log management/SIEM-like workflows
  clickhouse:
    enabled: false
    purpose: analytics/time-series/log warehouse
pipelines:
  default:
  - opentelemetry-collector
  - logstash
  - elasticsearch
  - kibana
  - prometheus
  - grafana
  loki:
  - promtail|alloy
  - loki
  - grafana
  opensearch:
  - logstash|fluent-bit
  - opensearch
  - opensearch-dashboards
  graylog:
  - beats|sidecar
  - graylog
  - mongodb
  - opensearch
  clickhouse:
  - vector|fluent-bit
  - clickhouse
  - grafana
dashboards:
  required:
  - cluster-capacity
  - workload-availability
  - data-dependencies
  - ingress-and-edge
  - release-and-deployments
