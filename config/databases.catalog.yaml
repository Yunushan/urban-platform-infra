source: https://endoflife.date/tags/database
default: postgresql
note: Profiles describe supported integration targets. Production HA may require the matching operator or managed service.
profiles:
  postgresql:
    status: default
    haProvider: cloudnative-pg
    images:
    - postgres:18.3
  postgis:
    status: default-for-spatial
    haProvider: cloudnative-pg
    images:
    - postgis/postgis:18-3.6
  timescaledb:
    status: default-for-timeseries
    haProvider: cloudnative-pg
    images:
    - timescale/timescaledb:2.26.4-pg18
  redis:
    status: enabled
    haProvider: sentinel|operator
    images:
    - redis:8.6.2
  elasticsearch:
    status: enabled-observability
    haProvider: eck
    images:
    - docker.elastic.co/elasticsearch/elasticsearch:9.4.1
  opensearch:
    status: optional
    haProvider: opensearch-operator|helm
  clickhouse:
    status: optional
    haProvider: clickhouse-operator
  graylog:
    status: optional-log-platform
    haProvider: graylog-chart|operator
  mysql:
    status: optional
    haProvider: operator|managed
    aliases:
    - mysql
    - vitess
    ports:
    - 3306
    migration:
      mode: scaffolded
      dumpTools:
      - mysqldump
      restoreTools:
      - mysql
      targetModes:
      - external
      - operator
      - managed
  mariadb:
    status: optional
    haProvider: operator|managed
    aliases:
    - mariadb
    ports:
    - 3306
    migration:
      mode: scaffolded
      dumpTools:
      - mariadb-dump
      restoreTools:
      - mariadb
      targetModes:
      - external
      - operator
      - managed
  mongodb:
    status: optional
    haProvider: operator|managed
    aliases:
    - mongodb
    - mongo
    ports:
    - 27017
    migration:
      mode: scaffolded
      dumpTools:
      - mongodump
      restoreTools:
      - mongorestore
      targetModes:
      - external
      - operator
      - managed
  cassandra:
    status: optional
    haProvider: cass-operator
  couchdb:
    status: optional
    haProvider: statefulset|operator
  hbase:
    status: optional
    haProvider: operator|raw
  hadoop:
    status: optional
    haProvider: operator|raw
  arangodb:
    status: optional
    haProvider: arangodb-operator
  cockroachdb:
    status: optional
    haProvider: cockroach-operator|helm
  couchbase:
    status: optional
    haProvider: couchbase-operator
  duckdb:
    status: optional-embedded
    haProvider: application-managed
  etcd:
    status: optional
    haProvider: static-pods|operator
  ibm-db2:
    status: optional
    haProvider: vendor
  memcached:
    status: optional-cache
    haProvider: replicated-cache
  microsoft-sql-server:
    status: optional
    haProvider: operator|managed
    aliases:
    - microsoft-sql-server
    - mssql
    - sqlserver
    ports:
    - 1433
    migration:
      mode: scaffolded
      dumpTools:
      - sqlpackage
      - bcp
      restoreTools:
      - sqlpackage
      - bcp
      targetModes:
      - external
      - operator
      - managed
  neo4j:
    status: optional
    haProvider: neo4j-helm
  oracle-database:
    status: optional
    haProvider: vendor|managed
  sqlite:
    status: optional-dev-only
    haProvider: not-ha
    aliases:
    - sqlite
    migration:
      mode: scaffolded
      dumpTools:
      - sqlite3
      restoreTools:
      - sqlite3
      targetModes:
      - single-pod-pvc
      - externalized-service
  tarantool:
    status: optional
    haProvider: operator|raw
  valkey:
    status: optional-cache
    haProvider: sentinel|operator
  vitess:
    status: optional-mysql-scaleout
    haProvider: vitess-operator
