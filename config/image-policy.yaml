policy:
  requireExplicitTags: true
  disallowMutableTags:
    - latest
    - latest-pg16
    - latest-pg17
    - latest-pg18
  requireDigestsForProduction: true
  defaultApplicationTag: 0.1.0
  imagePromotion:
    planGenerator: scripts/images/promotion_plan.py
    report: reports/image-promotion-plan.md
    controllerConfig: config/registry-promotion.yaml
    controllerGenerator: scripts/images/registry_promotion_controller.py
    controllerReport: reports/registry-promotion-controller.md
    controllerOverrides: reports/registry-promotion-values.yaml
    defaultControllerProfile: disabled
    requirePrivateRegistry: true
    requireDigestPins: true
    requireVulnerabilityScan: true
    requireSbom: true
    requireSignatureOrAttestation: true
    requirePromotionRecord: true
    publicSafeReport: true
  approvedRuntimeImages:
    - repository: nginxinc/nginx-unprivileged
      tag: '1.31.0'
      owner: webserver
    - repository: httpd
      tag: '2.4'
      owner: webserver
    - repository: tomcat
      tag: '10.1'
      owner: webserver
    - repository: traefik
      tag: v3.7.1
      owner: webserver
    - repository: confluentinc/cp-kafka
      tag: 7.9.6
      owner: messaging
    - repository: confluentinc/cp-zookeeper
      tag: 7.9.6
      owner: messaging
    - repository: provectuslabs/kafka-ui
      tag: v0.7.2
      owner: messaging
    - repository: redis
      tag: '8.6.2'
      owner: messaging
    - repository: postgres
      tag: '18.3'
      owner: database
    - repository: postgis/postgis
      tag: 18-3.6
      owner: database
    - repository: timescale/timescaledb
      tag: 2.26.4-pg18
      owner: database
    - repository: docker.elastic.co/elasticsearch/elasticsearch
      tag: 9.4.1
      owner: observability
    - repository: docker.elastic.co/kibana/kibana
      tag: 9.4.1
      owner: observability
    - repository: docker.elastic.co/logstash/logstash
      tag: 9.4.0
      owner: observability
    - repository: zabbix/zabbix-agent2
      tag: ubuntu-7.4.10
      owner: monitoring
  productionRequirements:
    - Mirror third-party images into an approved private registry before production deployment.
    - Use digest pins in production override files after image promotion.
    - Attach SBOM and vulnerability scan evidence to promoted application images.
    - Keep placeholder example-app images sanitized; replace them with private application images before real deployment.
