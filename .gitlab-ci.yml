stages:
  - validate
  - render
  - policy
  - security
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

validate:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install -r requirements-ci-modern.txt
    - python3 scripts/tools/validate_ci_contract.py
    - python3 scripts/tools/private_data_audit.py
    - python3 scripts/validate.py
    - python3 scripts/images/validate-images.py

render:
  stage: render
  image: alpine/helm:3.19.0
  script:
    - helm lint helm/urban-platform-infra
    - helm template urban-platform-infra helm/urban-platform-infra -n urban-platform -f helm/urban-platform-infra/values.yaml > rendered.yaml
  artifacts:
    paths:
      - rendered.yaml

policy:
  stage: policy
  image: python:3.12-slim
  needs: [render]
  script:
    - pip install -r requirements-ci-modern.txt
    - python3 tests/policy/basic_policy.py rendered.yaml

security:
  stage: security
  image: aquasec/trivy:0.70.0
  script:
    - trivy fs --ignore-unfixed --severity HIGH,CRITICAL --exit-code 0 .
  allow_failure: true

release-evidence:
  stage: release
  image: alpine/helm:3.19.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache python3
  script:
    - chart_version="$(python3 scripts/release/generate_sbom.py --chart helm/urban-platform-infra --print-chart-version)"
    - test "${CI_COMMIT_TAG#v}" = "${chart_version}"
    - mkdir -p dist
    - helm dependency build helm/urban-platform-infra
    - helm lint helm/urban-platform-infra
    - helm package helm/urban-platform-infra -d dist
    - >-
      helm template urban-platform-infra helm/urban-platform-infra
      -n urban-platform
      -f helm/urban-platform-infra/values.yaml
      > dist/rendered.yaml
    - >-
      python3 scripts/release/generate_sbom.py
      --chart helm/urban-platform-infra
      --dist dist
      --rendered dist/rendered.yaml
      --sbom dist/urban-platform-infra.spdx.json
      --manifest dist/release-evidence.json
      --checksums dist/SHA256SUMS
  artifacts:
    paths:
      - dist/*.tgz
      - dist/rendered.yaml
      - dist/urban-platform-infra.spdx.json
      - dist/release-evidence.json
      - dist/SHA256SUMS
