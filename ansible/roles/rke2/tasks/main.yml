---
- name: Validate RKE2 role inputs
  ansible.builtin.assert:
    that:
      - (rke2_token | default('') | length) >= 16
      - (rke2_token | default('') | regex_search('^CHANGE_ME')) is none
      - (rke2_version | default('')) is match('^v[0-9]+\\.[0-9]+\\.[0-9]+\\+rke2r[0-9]+$')
      - (rke2_ingress_controller | default('traefik')) in ['traefik', 'nginx', 'ingress-nginx']
      - (rke2_traefik_source | default('bundled')) in ['bundled', 'upstream']
      - >-
        (rke2_traefik_source | default('bundled')) != 'upstream'
        or (rke2_ingress_controller | default('traefik')) == 'traefik'
      - >-
        (rke2_traefik_source | default('bundled')) != 'upstream'
        or (
          (rke2_traefik_chart_version | default('') | length) > 0
          and (rke2_traefik_chart_version | default('') | regex_search('^CHANGE_ME')) is none
        )
      - cluster_vip | default('') | length > 0
      - cluster_domain | default('') | length > 0
    fail_msg: "RKE2 role requires a vaulted token, pinned rke2_version, supported ingress controller/source, cluster_vip, and cluster_domain. Upstream Traefik mode also requires rke2_traefik_chart_version."
  no_log: true

- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Set RKE2 service name
  ansible.builtin.set_fact:
    rke2_service_name: "{{ 'rke2-server' if inventory_hostname in groups['rke2_servers'] else 'rke2-agent' }}"
    rke2_normalized_ingress_controller: >-
      {{
        'ingress-nginx'
        if (rke2_ingress_controller | default('traefik')) in ['nginx', 'ingress-nginx']
        else 'traefik'
      }}
    rke2_normalized_traefik_source: "{{ rke2_traefik_source | default('bundled') }}"

- name: Set RKE2 ingress management facts
  ansible.builtin.set_fact:
    rke2_manage_bundled_traefik: >-
      {{
        rke2_normalized_ingress_controller == 'traefik'
        and rke2_normalized_traefik_source == 'bundled'
      }}
    rke2_manage_upstream_traefik: >-
      {{
        rke2_normalized_ingress_controller == 'traefik'
        and rke2_normalized_traefik_source == 'upstream'
      }}
    rke2_effective_ingress_controller: >-
      {{
        'none'
        if (
          rke2_normalized_ingress_controller == 'traefik'
          and rke2_normalized_traefik_source == 'upstream'
        )
        else rke2_normalized_ingress_controller
      }}

- name: Gather service facts before RKE2 changes
  ansible.builtin.service_facts:
  when: not ansible_check_mode

- name: Render RKE2 server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
    backup: true
  diff: false
  register: rke2_server_config
  when: inventory_hostname in groups['rke2_servers']

- name: Render RKE2 agent config
  ansible.builtin.template:
    src: agent-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
    backup: true
  diff: false
  register: rke2_agent_config
  when: inventory_hostname in groups.get('rke2_agents', [])

- name: Create RKE2 static manifest directory
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests
    state: directory
    mode: '0700'
  when:
    - inventory_hostname in groups['rke2_servers']
    - rke2_manage_bundled_traefik | bool or rke2_manage_upstream_traefik | bool

- name: Render RKE2 Traefik HelmChartConfig
  ansible.builtin.template:
    src: traefik-config.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-traefik-config.yaml
    mode: '0600'
  register: rke2_traefik_config
  when:
    - inventory_hostname in groups['rke2_servers']
    - rke2_manage_bundled_traefik | bool

- name: Remove RKE2 Traefik HelmChartConfig when bundled Traefik is not selected
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests/rke2-traefik-config.yaml
    state: absent
  register: rke2_traefik_config_absent
  when:
    - inventory_hostname in groups['rke2_servers']
    - not (rke2_manage_bundled_traefik | bool)

- name: Render upstream Traefik HelmChart when pinned mode is selected
  ansible.builtin.template:
    src: traefik-helmchart.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/traefik-helmchart.yaml
    mode: '0600'
  register: rke2_upstream_traefik_chart
  when:
    - inventory_hostname in groups['rke2_servers']
    - rke2_manage_upstream_traefik | bool

- name: Remove upstream Traefik HelmChart when pinned mode is not selected
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests/traefik-helmchart.yaml
    state: absent
  register: rke2_upstream_traefik_chart_absent
  when:
    - inventory_hostname in groups['rke2_servers']
    - not (rke2_manage_upstream_traefik | bool)

- name: Reject unsupported RKE2 cluster-init config
  ansible.builtin.command: grep -n '^cluster-init:' /etc/rancher/rke2/config.yaml
  register: rke2_unsupported_cluster_init
  changed_when: false
  failed_when: rke2_unsupported_cluster_init.rc == 0
  when: inventory_hostname in groups['rke2_servers']

- name: Check RKE2 server join URL in rendered config
  ansible.builtin.command: grep -n '^server:' /etc/rancher/rke2/config.yaml
  register: rke2_server_join_url
  changed_when: false
  failed_when: >-
    (
      inventory_hostname == groups['rke2_servers'][0]
      and rke2_server_join_url.rc == 0
    )
    or
    (
      inventory_hostname != groups['rke2_servers'][0]
      and rke2_server_join_url.rc != 0
    )
  when: inventory_hostname in groups['rke2_servers']

- name: Install RKE2 server
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.rke2.io | sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/rke2
  environment:
    INSTALL_RKE2_TYPE: server
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Install RKE2 agent
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.rke2.io | sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/rke2
  environment:
    INSTALL_RKE2_TYPE: agent
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
  when:
    - inventory_hostname in groups.get('rke2_agents', [])
    - not ansible_check_mode

- name: Check firewalld state
  ansible.builtin.command: systemctl is-active firewalld
  register: rke2_firewalld_state
  changed_when: false
  failed_when: false
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode

- name: Open RKE2 ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop: >-
    {{
      (rke2_firewalld_common_ports | default(['80/tcp', '443/tcp', '8472/udp', '10250/tcp'])) +
      (
        rke2_firewalld_server_ports | default(['6443/tcp', '9345/tcp', '2379/tcp', '2380/tcp'])
        if inventory_hostname in groups['rke2_servers']
        else []
      )
    }}
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode
    - rke2_firewalld_state.stdout | default('') == 'active'

- name: Trust RKE2 pod and service CIDRs in firewalld
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "{{ pod_cidr | default('100.64.0.0/16') }}"
    - "{{ service_cidr | default('100.65.0.0/16') }}"
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode
    - rke2_firewalld_state.stdout | default('') == 'active'

- name: Enable firewalld masquerade for RKE2 overlay egress
  ansible.posix.firewalld:
    masquerade: true
    permanent: true
    immediate: true
    state: enabled
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode
    - rke2_firewalld_state.stdout | default('') == 'active'

- name: Set RKE2 service facts
  ansible.builtin.set_fact:
    rke2_config_changed: >-
      {{
        (
          inventory_hostname in groups['rke2_servers'] and
          (
            rke2_server_config.changed | default(false) or
            rke2_traefik_config.changed | default(false) or
            rke2_traefik_config_absent.changed | default(false) or
            rke2_upstream_traefik_chart.changed | default(false) or
            rke2_upstream_traefik_chart_absent.changed | default(false)
          )
        ) or
        (
          inventory_hostname in groups.get('rke2_agents', []) and
          rke2_agent_config.changed | default(false)
        )
      }}
    rke2_service_existed_before_config: >-
      {{ ((ansible_facts.services | default({}))[rke2_service_name ~ '.service']) is defined }}

- name: Enable RKE2 service
  ansible.builtin.service:
    name: "{{ rke2_service_name }}"
    enabled: true
  when: not ansible_check_mode

- name: Start or restart RKE2 service in background
  ansible.builtin.systemd_service:
    name: "{{ rke2_service_name }}"
    state: "{{ 'restarted' if (rke2_service_existed_before_config | bool and rke2_config_changed | bool) else 'started' }}"
  async: "{{ rke2_service_start_async_timeout | default(1200) }}"
  poll: 0
  changed_when: true
  when: not ansible_check_mode

- name: Give RKE2 service an initial startup window
  ansible.builtin.pause:
    seconds: "{{ rke2_initial_startup_delay | default(20) }}"
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Read initial RKE2 startup state
  ansible.builtin.shell: |
    set -euo pipefail
    service_state="$(
      systemctl show "{{ rke2_service_name }}" \
        --property=ActiveState \
        --property=SubState \
        --property=Result \
        --property=ExecMainStatus \
        --value | paste -sd ' ' -
    )"
    echo "service_state=${service_state}"
    echo "listeners=$(ss -ltnH | awk '{print $4}' | grep -E '(:|\\])((6443)|(9345)|(2379)|(2380)|(10250))$' || true)"
    journalctl -u "{{ rke2_service_name }}" --no-pager -n "{{ rke2_initial_journal_lines | default(40) }}"
  args:
    executable: /bin/bash
  register: rke2_initial_startup_state
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Show initial RKE2 startup state
  ansible.builtin.debug:
    msg: "{{ rke2_initial_startup_state.stdout_lines | default([]) }}"
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Scan recent RKE2 journal for corrupt embedded etcd snapshot state
  ansible.builtin.shell: |
    set -euo pipefail
    corrupt_pattern='failed to recover v3 backend from snapshot'
    corrupt_pattern="${corrupt_pattern}|failed to find database snapshot file"
    corrupt_pattern="${corrupt_pattern}|snapshot file doesn"
    journalctl -u "{{ rke2_service_name }}" \
      --no-pager \
      -n "{{ rke2_corrupt_etcd_journal_lines | default(800) }}" |
      grep -E "${corrupt_pattern}"
  args:
    executable: /bin/bash
  register: rke2_corrupt_etcd_snapshot_scan
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Detect corrupt RKE2 embedded etcd snapshot state
  ansible.builtin.set_fact:
    rke2_corrupt_etcd_snapshot_detected: >-
      {{
        (
          (
            (rke2_initial_startup_state.stdout | default('')) |
            regex_search(
              'failed to recover v3 backend from snapshot|'
              ~ 'failed to find database snapshot file|'
              ~ 'snapshot file doesn'
            )
          ) is not none
        ) or
        (rke2_corrupt_etcd_snapshot_scan.rc | default(1) == 0)
      }}
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Recover corrupt RKE2 embedded etcd snapshot state
  block:
    - name: Stop RKE2 before corrupt datastore archive
      ansible.builtin.systemd_service:
        name: "{{ rke2_service_name }}"
        state: stopped
      failed_when: false

    - name: Archive corrupt RKE2 datastore before retry
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -d /var/lib/rancher/rke2/server/db ]; then
          backup="/var/lib/rancher/rke2/server/db.corrupt.$(date -u +%Y%m%dT%H%M%SZ)"
          mv /var/lib/rancher/rke2/server/db "${backup}"
          echo "${backup}"
        fi
      args:
        executable: /bin/bash
      register: rke2_corrupt_datastore_archive
      changed_when: rke2_corrupt_datastore_archive.stdout | length > 0

    - name: Show archived corrupt RKE2 datastore path
      ansible.builtin.debug:
        msg: "{{ rke2_corrupt_datastore_archive.stdout_lines | default([]) }}"
      when: rke2_corrupt_datastore_archive.stdout | default('') | length > 0

    - name: Reset failed RKE2 service state
      ansible.builtin.command: systemctl reset-failed "{{ rke2_service_name }}"
      changed_when: false
      failed_when: false

    - name: Start RKE2 after corrupt datastore archive
      ansible.builtin.systemd_service:
        name: "{{ rke2_service_name }}"
        state: started
      async: "{{ rke2_service_start_async_timeout | default(1200) }}"
      poll: 0
      changed_when: true

    - name: Give recovered RKE2 service an initial startup window
      ansible.builtin.pause:
        seconds: "{{ rke2_initial_startup_delay | default(20) }}"

    - name: Read recovered RKE2 startup state
      ansible.builtin.shell: |
        set -euo pipefail
        service_state="$(
          systemctl show "{{ rke2_service_name }}" \
            --property=ActiveState \
            --property=SubState \
            --property=Result \
            --property=ExecMainStatus \
            --value | paste -sd ' ' -
        )"
        echo "service_state=${service_state}"
        echo "listeners=$(ss -ltnH | awk '{print $4}' | grep -E '(:|\\])((6443)|(9345)|(2379)|(2380)|(10250))$' || true)"
        journalctl -u "{{ rke2_service_name }}" --no-pager -n "{{ rke2_initial_journal_lines | default(40) }}"
      args:
        executable: /bin/bash
      register: rke2_recovered_startup_state
      changed_when: false
      failed_when: false

    - name: Show recovered RKE2 startup state
      ansible.builtin.debug:
        msg: "{{ rke2_recovered_startup_state.stdout_lines | default([]) }}"
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode
    - rke2_auto_recover_corrupt_etcd_snapshot | default(true) | bool
    - rke2_corrupt_etcd_snapshot_detected | default(false) | bool

- name: Wait for local RKE2 registration endpoint
  block:
    - name: Wait for local RKE2 registration endpoint
      ansible.builtin.shell: |
        set -euo pipefail
        active_state="$(systemctl show "{{ rke2_service_name }}" --property=ActiveState --value)"
        sub_state="$(systemctl show "{{ rke2_service_name }}" --property=SubState --value)"
        result="$(systemctl show "{{ rke2_service_name }}" --property=Result --value)"
        exec_status="$(systemctl show "{{ rke2_service_name }}" --property=ExecMainStatus --value)"
        if [ "${result}" = "exit-code" ] || { [ -n "${exec_status}" ] && [ "${exec_status}" != "0" ]; }; then
          echo "service_failed active=${active_state} sub=${sub_state} result=${result} exec_status=${exec_status}"
          exit 2
        fi
        if systemctl is-failed --quiet "{{ rke2_service_name }}"; then
          echo "service_failed"
          exit 2
        fi
        if ss -ltnH | awk '{print $4}' | grep -Eq '(^|:|\])9345$'; then
          echo "registration_ready"
          exit 0
        fi
        echo "registration_waiting"
        exit 1
      args:
        executable: /bin/bash
      register: rke2_registration_probe
      changed_when: false
      failed_when: false
      retries: "{{ rke2_local_registration_retries | default(30) }}"
      delay: "{{ rke2_local_registration_delay | default(10) }}"
      until: rke2_registration_probe.rc in [0, 2]

    - name: Fail when RKE2 service fails during registration wait
      ansible.builtin.fail:
        msg: "{{ rke2_registration_probe.stdout | default('RKE2 service failed before registration port 9345 opened.') }}"
      when: rke2_registration_probe.rc == 2
  rescue:
    - name: Read RKE2 service status after registration wait failure
      ansible.builtin.command: "systemctl status {{ rke2_service_name }} --no-pager -l"
      register: rke2_service_status
      changed_when: false
      failed_when: false

    - name: Read recent RKE2 journal after registration wait failure
      ansible.builtin.command: "journalctl -u {{ rke2_service_name }} --no-pager -n 160"
      register: rke2_service_journal
      changed_when: false
      failed_when: false

    - name: Read RKE2 listener state after registration wait failure
      ansible.builtin.command: "ss -ltnp"
      register: rke2_socket_state
      changed_when: false
      failed_when: false

    - name: Show RKE2 startup diagnostics
      ansible.builtin.debug:
        msg:
          - "{{ rke2_service_status.stdout_lines | default([]) }}"
          - "{{ rke2_service_journal.stdout_lines | default([]) }}"
          - "{{ rke2_socket_state.stdout_lines | default([]) | select('search', ':6443|:9345|:2379|:2380|:10250') | list }}"

    - name: Fail because RKE2 registration endpoint did not open
      ansible.builtin.fail:
        msg:
          - "RKE2 did not open local registration port 9345 before timeout."
          - "Service status:"
          - "{{ rke2_service_status.stdout_lines | default([]) }}"
          - "Recent journal:"
          - "{{ rke2_service_journal.stdout_lines | default([]) }}"
          - "Relevant listeners:"
          - "{{ rke2_socket_state.stdout_lines | default([]) | select('search', ':6443|:9345|:2379|:2380|:10250') | list }}"
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode

- name: Wait for local RKE2 Kubernetes API readiness
  block:
    - name: Wait for local RKE2 Kubernetes API readiness
      ansible.builtin.shell: |
        set -euo pipefail
        active_state="$(systemctl show "{{ rke2_service_name }}" --property=ActiveState --value)"
        sub_state="$(systemctl show "{{ rke2_service_name }}" --property=SubState --value)"
        result="$(systemctl show "{{ rke2_service_name }}" --property=Result --value)"
        exec_status="$(systemctl show "{{ rke2_service_name }}" --property=ExecMainStatus --value)"
        if [ "${result}" = "exit-code" ] || { [ -n "${exec_status}" ] && [ "${exec_status}" != "0" ]; }; then
          echo "service_failed active=${active_state} sub=${sub_state} result=${result} exec_status=${exec_status}"
          exit 2
        fi
        if systemctl is-failed --quiet "{{ rke2_service_name }}"; then
          echo "service_failed"
          exit 2
        fi
        if /var/lib/rancher/rke2/bin/kubectl \
          --kubeconfig /etc/rancher/rke2/rke2.yaml \
          --request-timeout=10s \
          get --raw=/readyz >/dev/null 2>&1; then
          echo "api_ready"
          exit 0
        fi
        echo "api_waiting active=${active_state} sub=${sub_state}"
        exit 1
      args:
        executable: /bin/bash
      register: rke2_api_ready_probe
      changed_when: false
      failed_when: false
      retries: "{{ rke2_local_api_retries | default(60) }}"
      delay: "{{ rke2_local_api_delay | default(10) }}"
      until: rke2_api_ready_probe.rc in [0, 2]

    - name: Fail when RKE2 service fails during API readiness wait
      ansible.builtin.fail:
        msg: "{{ rke2_api_ready_probe.stdout | default('RKE2 service failed before the Kubernetes API became ready.') }}"
      when: rke2_api_ready_probe.rc == 2
  rescue:
    - name: Read RKE2 service status after API readiness wait failure
      ansible.builtin.command: "systemctl status {{ rke2_service_name }} --no-pager -l"
      register: rke2_api_service_status
      changed_when: false
      failed_when: false

    - name: Read recent RKE2 journal after API readiness wait failure
      ansible.builtin.command: "journalctl -u {{ rke2_service_name }} --no-pager -n 160"
      register: rke2_api_service_journal
      changed_when: false
      failed_when: false

    - name: Read RKE2 listener state after API readiness wait failure
      ansible.builtin.command: "ss -ltnp"
      register: rke2_api_socket_state
      changed_when: false
      failed_when: false

    - name: Show RKE2 API startup diagnostics
      ansible.builtin.debug:
        msg:
          - "RKE2 local Kubernetes API did not become ready before timeout."
          - "Service status:"
          - "{{ rke2_api_service_status.stdout_lines | default([]) }}"
          - "Recent journal:"
          - "{{ rke2_api_service_journal.stdout_lines | default([]) }}"
          - "Relevant listeners:"
          - "{{ rke2_api_socket_state.stdout_lines | default([]) | select('search', ':6443|:9345|:2379|:2380|:10250') | list }}"

    - name: Fail because RKE2 Kubernetes API did not become ready
      ansible.builtin.fail:
        msg: "RKE2 local Kubernetes API did not become ready before timeout."
  when:
    - inventory_hostname in groups['rke2_servers']
    - not ansible_check_mode
