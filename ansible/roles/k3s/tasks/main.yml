---
- name: Validate K3s role inputs
  ansible.builtin.assert:
    that:
      - (k3s_token | default('') | length) >= 16
      - (k3s_token | default('') | regex_search('^CHANGE_ME')) is none
      - cluster_vip | default('') | length > 0
      - cluster_domain | default('') | length > 0
    fail_msg: "K3s role requires a vaulted token, cluster_vip, and cluster_domain."
  no_log: true

- name: Create K3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Render K3s config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0600'
    backup: true
  diff: false

- name: Install K3s server or agent
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="{{ 'server' if inventory_hostname in groups['rke2_servers'] else 'agent' }}" sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when: not ansible_check_mode
