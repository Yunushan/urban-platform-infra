---
- name: Install common RHEL/Rocky/Alma/Oracle/CentOS packages
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
      - iptables
      - iproute
      - nfs-utils
      - iscsi-initiator-utils
      - policycoreutils-python-utils
      - unzip
    state: present

- name: Install optional RHEL-family operator helper packages
  ansible.builtin.package:
    name:
      - jq
    state: present
  register: redhat_optional_helper_packages
  failed_when: false
