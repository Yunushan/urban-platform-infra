---
- name: Validate Keepalived shared secret
  ansible.builtin.assert:
    that:
      - keepalived_auth_pass | default('') | length > 0
      - (keepalived_auth_pass | default('') | regex_search('^CHANGE_ME')) is none
      - keepalived_auth_pass | default('') != 'changeMe'
    fail_msg: "keepalived_auth_pass must be provided from inventory or vault."
  no_log: true
  when: ansible_system == 'Linux'

- name: Install HAProxy and Keepalived
  ansible.builtin.package:
    name:
      - haproxy
      - keepalived
    state: present
  when: ansible_system == 'Linux'

- name: Check firewalld state for HA services
  ansible.builtin.command: systemctl is-active firewalld
  register: haproxy_keepalived_firewalld_state
  changed_when: false
  failed_when: false
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode

- name: Build HAProxy VIP port and allowlist configuration
  ansible.builtin.set_fact:
    haproxy_keepalived_edge_tcp_services: >-
      {{
        ((edge_observability_ports_enabled | default(false) | bool)
          | ternary(edge_observability_tcp_services | default([]), []))
        + (edge_extra_tcp_services | default([]))
      }}
    haproxy_keepalived_edge_allowed_cidrs: >-
      {{
        (edge_allowed_cidrs_text | default('') | trim | length > 0)
        | ternary((edge_allowed_cidrs_text | default('')).split(), edge_allowed_cidrs | default([]))
      }}
  when: ansible_system == 'Linux'

- name: Build HAProxy VIP port list
  ansible.builtin.set_fact:
    haproxy_keepalived_vip_ports: >-
      {{
        [
          kubernetes_api_vip_port | default(7443),
          rke2_registration_vip_port | default(9346)
        ]
        + (haproxy_keepalived_edge_tcp_services | map(attribute='external_port') | list)
      }}
  when: ansible_system == 'Linux'

- name: Open HAProxy VIP ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ haproxy_keepalived_vip_ports | unique }}"
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode
    - haproxy_keepalived_firewalld_state.stdout | default('') == 'active'

- name: Allow HAProxy to bind VIP frontend ports under SELinux
  ansible.builtin.shell: |
    set -euo pipefail
    port="{{ item }}"
    if semanage port -l | awk '$1 == "http_port_t" && $2 == "tcp" {print $0}' | grep -Eq "(^|[ ,])${port}([, ]|$)"; then
      echo unchanged
    elif semanage port -l | awk '$2 == "tcp" {print $0}' | grep -Eq "(^|[ ,])${port}([, ]|$)"; then
      semanage port -m -t http_port_t -p tcp "${port}"
      echo changed
    else
      semanage port -a -t http_port_t -p tcp "${port}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop: "{{ haproxy_keepalived_vip_ports | unique }}"
  register: haproxy_selinux_port
  changed_when: "'changed' in haproxy_selinux_port.stdout"
  when:
    - ansible_os_family == 'RedHat'
    - ansible_selinux.status | default('disabled') == 'enabled'
    - not ansible_check_mode

- name: Read HAProxy SELinux backend connection boolean
  ansible.builtin.command: getsebool haproxy_connect_any
  register: haproxy_connect_any_boolean
  changed_when: false
  failed_when: false
  when:
    - ansible_os_family == 'RedHat'
    - ansible_selinux.status | default('disabled') == 'enabled'
    - not ansible_check_mode

- name: Allow HAProxy SELinux backend connections
  ansible.builtin.command: setsebool -P haproxy_connect_any 1
  when:
    - ansible_os_family == 'RedHat'
    - ansible_selinux.status | default('disabled') == 'enabled'
    - not ansible_check_mode
    - haproxy_connect_any_boolean.rc == 0
    - "'off' in haproxy_connect_any_boolean.stdout"

- name: Configure HAProxy for RKE2/Kubernetes API and registration ports
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
    backup: true
    validate: haproxy -c -f %s
  notify: Restart haproxy
  when: ansible_system == 'Linux'

- name: Configure Keepalived virtual IP
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0600'
    backup: true
    validate: keepalived -t -f %s
  diff: false
  notify: Restart keepalived
  when: ansible_system == 'Linux'

- name: Enable HA services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - haproxy
    - keepalived
  when:
    - ansible_system == 'Linux'
    - not ansible_check_mode
