---
- import_playbook: preflight.yml

- name: Bootstrap city-intersection cluster nodes
  hosts: cluster_nodes
  become: true
  gather_facts: true
  any_errors_fatal: true
  force_handlers: true
  serial: "{{ bootstrap_serial | default('50%') }}"
  roles:
    - role: common
    - role: chrony

- name: Configure HAProxy and Keepalived for Kubernetes control-plane VIP
  hosts: load_balancers
  become: true
  gather_facts: true
  any_errors_fatal: true
  force_handlers: true
  serial: 1
  roles:
    - role: haproxy_keepalived
