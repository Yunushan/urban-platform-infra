---
- name: Validate bootstrap inventory and operator intent
  hosts: localhost
  gather_facts: false
  vars:
    selected_cluster_engine: "{{ cluster_engine | default('rke2') }}"
    supported_cluster_engines:
      - rke2
      - k3s
      - microk8s
      - docker
      - raw
  tasks:
    - name: Validate selected cluster engine
      ansible.builtin.assert:
        that:
          - selected_cluster_engine in supported_cluster_engines
        fail_msg: "cluster_engine must be one of: {{ supported_cluster_engines | join(', ') }}"

    - name: Validate inventory groups
      ansible.builtin.assert:
        that:
          - (groups.get('cluster_nodes', []) | length) > 0
          - selected_cluster_engine not in ['rke2', 'k3s'] or (groups.get('rke2_servers', []) | length) >= 1
        fail_msg: "Inventory must define cluster_nodes and at least one rke2_servers host for Kubernetes engines."

    - name: Validate RKE2 production inputs
      ansible.builtin.assert:
        that:
          - (rke2_token | default('') | length) >= 16
          - (rke2_token | default('') | regex_search('^CHANGE_ME')) is none
          - (rke2_version | default('')) is match('^v[0-9]+\\.[0-9]+\\.[0-9]+\\+rke2r[0-9]+$')
          - cluster_vip | default('') | length > 0
          - cluster_domain | default('') | length > 0
        fail_msg: "RKE2 requires a vaulted token, pinned rke2_version, cluster_vip, and cluster_domain."
      no_log: true
      when: selected_cluster_engine == 'rke2'

    - name: Validate K3s production inputs
      ansible.builtin.assert:
        that:
          - (k3s_token | default('') | length) >= 16
          - (k3s_token | default('') | regex_search('^CHANGE_ME')) is none
          - cluster_vip | default('') | length > 0
          - cluster_domain | default('') | length > 0
        fail_msg: "K3s requires a vaulted token, cluster_vip, and cluster_domain."
      no_log: true
      when: selected_cluster_engine == 'k3s'

    - name: Validate load balancer secret inputs
      ansible.builtin.assert:
        that:
          - keepalived_auth_pass | default('') | length > 0
          - (keepalived_auth_pass | default('') | regex_search('^CHANGE_ME')) is none
          - keepalived_auth_pass | default('') != 'changeMe'
        fail_msg: "Keepalived auth password must be provided through inventory or vault."
      no_log: true
      when:
        - selected_cluster_engine in ['rke2', 'k3s']
        - (groups.get('load_balancers', []) | length) > 0

- name: Validate target host readiness
  hosts: cluster_nodes
  gather_facts: true
  any_errors_fatal: true
  vars:
    supported_ubuntu_versions:
      - "22.04"
      - "24.04"
      - "26.04"
    supported_debian_major_versions:
      - "11"
      - "12"
      - "13"
    supported_rhel_family_major_versions:
      - "7"
      - "8"
      - "9"
      - "10"
    supported_oracle_linux_major_versions:
      - "10"
    supported_centos_stream_major_versions:
      - "9"
      - "10"
    supported_ansible_220_target_python_min: "3.9"
    supported_ansible_220_target_python_max_exclusive: "3.15"
    supported_rhel_family_distributions:
      - redhat
      - redhat-enterprise-linux
      - rocky
      - rocky-linux
      - almalinux
      - almalinux-os
    supported_oracle_linux_distributions:
      - oraclelinux
      - oracle-linux
      - oracle-linux-server
    supported_centos_stream_distributions:
      - centos
      - centos-stream
  tasks:
    - name: Validate host operating system for cluster bootstrap
      ansible.builtin.assert:
        that:
          - ansible_system == 'Linux'
        fail_msg: "Cluster bootstrap targets must be Linux hosts for rke2, k3s, microk8s, and docker profiles."
      when: cluster_engine | default('rke2') in ['rke2', 'k3s', 'microk8s', 'docker']

    - name: Normalize RedHat-family distribution facts
      ansible.builtin.set_fact:
        platform_distribution_name: "{{ ansible_distribution | default('') | lower | regex_replace('[^a-z0-9]+', '-') }}"
        platform_distribution_major: "{{ ansible_distribution_major_version | default('') | string }}"
        platform_distribution_release: "{{ ansible_distribution_release | default('') | lower }}"
      when: ansible_os_family == 'RedHat'

    - name: Normalize Debian-family distribution facts
      ansible.builtin.set_fact:
        platform_distribution_name: "{{ ansible_distribution | default('') | lower | regex_replace('[^a-z0-9]+', '-') }}"
        platform_distribution_version: "{{ ansible_distribution_version | default('') | string }}"
        platform_distribution_major: "{{ ansible_distribution_major_version | default('') | string }}"
      when: ansible_os_family == 'Debian'

    - name: Validate supported Debian-family cluster node version
      ansible.builtin.assert:
        that:
          - >
            (
              platform_distribution_name == 'ubuntu'
              and platform_distribution_version in supported_ubuntu_versions
            )
            or
            (
              platform_distribution_name == 'debian'
              and platform_distribution_major in supported_debian_major_versions
            )
        fail_msg: >-
          Debian-family cluster nodes must be Ubuntu 22.04/24.04/26.04 or Debian 11/12/13.
          Detected {{ ansible_distribution }} {{ ansible_distribution_version }}.
      when:
        - cluster_engine | default('rke2') in ['rke2', 'k3s', 'microk8s', 'docker']
        - ansible_os_family == 'Debian'

    - name: Validate supported RedHat-family cluster node version
      ansible.builtin.assert:
        that:
          - >
            (
              platform_distribution_name in supported_rhel_family_distributions
              and platform_distribution_major in supported_rhel_family_major_versions
            )
            or
            (
              platform_distribution_name in supported_oracle_linux_distributions
              and platform_distribution_major in supported_oracle_linux_major_versions
            )
            or
            (
              platform_distribution_name in supported_centos_stream_distributions
              and platform_distribution_major in supported_centos_stream_major_versions
              and (
                platform_distribution_name == 'centos-stream'
                or platform_distribution_release == 'stream'
              )
            )
        fail_msg: >-
          RedHat-family cluster nodes must be RHEL, Rocky Linux, or AlmaLinux major 7/8/9/10,
          Oracle Linux major 10, or CentOS Stream major 9/10.
          Detected {{ ansible_distribution }} {{ ansible_distribution_version }}.
      when:
        - cluster_engine | default('rke2') in ['rke2', 'k3s', 'docker']
        - ansible_os_family == 'RedHat'

    - name: Validate RedHat-family major 10 target Python compatibility
      ansible.builtin.assert:
        that:
          - ansible_python_version is version(supported_ansible_220_target_python_min, '>=')
          - ansible_python_version is version(supported_ansible_220_target_python_max_exclusive, '<')
        fail_msg: >-
          RedHat-family major 10 nodes must expose Python 3.9 through 3.14 for
          ansible-core 2.20 compatibility. Detected Python {{ ansible_python_version }}.
      when:
        - cluster_engine | default('rke2') in ['rke2', 'k3s', 'docker']
        - ansible_os_family == 'RedHat'
        - platform_distribution_major == '10'

    - name: Validate node address variables
      ansible.builtin.assert:
        that:
          - ansible_host | default('') | length > 0
          - node_ip | default(ansible_host) | length > 0
        fail_msg: "Each cluster node must define ansible_host and should define node_ip explicitly."
