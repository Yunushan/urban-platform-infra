all:
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
    cluster_engine: rke2
    cluster_vip: 192.0.2.10
    cluster_domain: city-intersection.example.com
    rke2_token: "CHANGE_ME_VAULTED_RKE2_TOKEN"
    rke2_version: "CHANGE_ME_PIN_RKE2_VERSION"
    k3s_token: "CHANGE_ME_VAULTED_K3S_TOKEN"
    keepalived_auth_pass: "CHANGE_ME"
    keepalived_interface: eth0
    chrony_servers:
      - pool.ntp.org iburst
    pod_cidr: 10.42.0.0/16
    service_cidr: 10.43.0.0/16
  children:
    cluster_nodes:
      children:
        rke2_servers:
        rke2_agents:
    rke2_servers:
      hosts:
        cip-cp-01:
          ansible_host: 192.0.2.11
          node_ip: 192.0.2.11
          keepalived_priority: 110
        cip-cp-02:
          ansible_host: 192.0.2.12
          node_ip: 192.0.2.12
          keepalived_priority: 105
        cip-cp-03:
          ansible_host: 192.0.2.13
          node_ip: 192.0.2.13
          keepalived_priority: 100
    rke2_agents:
      hosts:
        cip-worker-01:
          ansible_host: 192.0.2.14
          node_ip: 192.0.2.14
        cip-worker-02:
          ansible_host: 192.0.2.15
          node_ip: 192.0.2.15
    load_balancers:
      hosts:
        cip-cp-01:
        cip-cp-02:
        cip-cp-03:
