all:
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
    cluster_engine: rke2
    cluster_vip: 192.0.2.21
    cluster_domain: two-node-lab.example.com
    rke2_token: "CHANGE_ME_VAULTED_RKE2_TOKEN"
    rke2_version: "CHANGE_ME_PIN_RKE2_VERSION"
    k3s_token: "CHANGE_ME_VAULTED_K3S_TOKEN"
    keepalived_auth_pass: "CHANGE_ME"
    keepalived_interface: eth0
    chrony_servers:
      - pool.ntp.org iburst
    pod_cidr: 10.42.0.0/16
    service_cidr: 10.43.0.0/16
  children:
    cluster_nodes:
      children:
        rke2_servers:
        rke2_agents:
    rke2_servers:
      hosts:
        cip-lab-cp-01:
          ansible_host: 192.0.2.21
          node_ip: 192.0.2.21
    rke2_agents:
      hosts:
        cip-lab-worker-01:
          ansible_host: 192.0.2.22
          node_ip: 192.0.2.22
    load_balancers:
      hosts: {}
