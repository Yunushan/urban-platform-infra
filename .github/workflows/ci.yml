name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install pyyaml
      - name: Validate repository
        run: python3 scripts/validate.py
      - name: Helm lint
        uses: azure/setup-helm@v5
      - run: helm lint helm/city-intersection-platform
      - name: Render chart
        run: helm template city-intersection-project helm/city-intersection-platform -n city-intersection -f helm/city-intersection-platform/values.yaml > rendered.yaml
      - name: Basic policy checks
        run: python3 tests/policy/basic_policy.py rendered.yaml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
