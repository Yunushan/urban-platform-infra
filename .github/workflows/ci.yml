name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  HELM_CHART: helm/urban-platform-infra
  RELEASE_NAME: urban-platform-infra
  NAMESPACE: urban-platform
  VALUES_FILE: helm/urban-platform-infra/values.yaml
  RENDERED_MANIFEST: reports/rendered.yaml

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install static analysis dependencies
        run: pip install -r requirements-ci.txt
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Run yamllint
        run: yamllint .
      - name: Run Ansible syntax checks
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          ansible-playbook -i inventories/example/hosts.yml ansible/playbooks/preflight.yml --syntax-check
          ansible-playbook -i inventories/example/hosts.yml ansible/playbooks/bootstrap.yml --syntax-check
          ansible-playbook -i inventories/example/hosts.yml ansible/playbooks/install-cluster.yml --syntax-check
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        shell: bash
        run: |
          mapfile -t scripts < <(git ls-files '*.sh')
          if (( ${#scripts[@]} )); then
            shellcheck "${scripts[@]}"
          fi

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  validate:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt
      - name: Validate repository
        run: |
          python3 scripts/validate.py
          python3 scripts/images/validate-images.py

  render:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt
      - name: Helm lint
        uses: azure/setup-helm@v5
      - name: Run helm lint
        run: helm lint "${HELM_CHART}"
      - name: Render chart
        run: |
          mkdir -p reports
          helm template "${RELEASE_NAME}" "${HELM_CHART}" \
            --namespace "${NAMESPACE}" \
            -f "${VALUES_FILE}" \
            > "${RENDERED_MANIFEST}"
      - name: Basic policy checks
        run: python3 tests/policy/basic_policy.py "${RENDERED_MANIFEST}"
      - name: Upload rendered manifest
        uses: actions/upload-artifact@v7
        with:
          name: rendered-manifest
          path: ${{ env.RENDERED_MANIFEST }}

  security:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
