{{- if .Values.messaging.redis.enabled }}
{{- $redisReplicas := int (include "cip.replicaCount" (list . (.Values.messaging.redis.replicas | default 3))) }}
{{- $sentinelQuorum := int (min 2 $redisReplicas) }}
{{- $sentinelEnabled := and .Values.messaging.redis.sentinel.enabled (gt $redisReplicas 1) }}
{{- $redisStorageClass := include "cip.storageClassName" (list . (.Values.messaging.redis.storage.className | default "") "hot") }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-bootstrap
  namespace: {{ include "cip.namespace" . }}
data:
  redis.conf: |
    appendonly yes
    protected-mode no
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster redis-0.redis-headless.{{ include "cip.namespace" . }}.svc.cluster.local 6379 {{ $sentinelQuorum }}
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: {{ .Values.messaging.redis.port }}
{{- if $sentinelEnabled }}
    - name: sentinel
      port: {{ .Values.messaging.redis.sentinel.port }}
{{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  serviceName: redis-headless
  replicas: {{ $redisReplicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: urban-platform-infra
    spec:
      {{- include "cip.podSpecDefaults" . | nindent 6 }}
      containers:
        - name: redis
          image: {{ include "cip.image" (list . .Values.messaging.redis.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              if [ "${HOSTNAME##*-}" != "0" ]; then
                redis-server /config/redis.conf --replicaof redis-0.redis-headless 6379
              else
                redis-server /config/redis.conf
              fi
          ports:
            - name: redis
              containerPort: {{ .Values.messaging.redis.port }}
          {{- with .Values.messaging.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
{{- if $sentinelEnabled }}
        - name: sentinel
          image: {{ include "cip.image" (list . .Values.messaging.redis.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          command: ["redis-sentinel", "/config/sentinel.conf"]
          ports:
            - name: sentinel
              containerPort: {{ .Values.messaging.redis.sentinel.port }}
          {{- with .Values.messaging.redis.sentinel.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
{{- end }}
      volumes:
        - name: config
          configMap:
            name: redis-bootstrap
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
{{ if $redisStorageClass }}
        storageClassName: {{ $redisStorageClass | quote }}
{{ end }}
        resources:
          requests:
            storage: {{ .Values.messaging.redis.storage.size | default "10Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "cip.namespace" . }}
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: {{ .Values.messaging.redis.port }}
      targetPort: redis
{{- if $sentinelEnabled }}
    - name: sentinel
      port: {{ .Values.messaging.redis.sentinel.port }}
      targetPort: sentinel
{{- end }}
{{- end }}
