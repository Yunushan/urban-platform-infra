{{- $providerName := .Values.webserver.provider | default "nginx" -}}
{{- $provider := index .Values.webserver.providers $providerName -}}
{{- if $provider }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver-{{ $providerName }}
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: webserver-{{ $providerName }}
    urban-platform.io/component: webserver
spec:
  replicas: {{ include "cip.replicaCount" (list . ($provider.replicas | default 3)) }}
  selector:
    matchLabels:
      app.kubernetes.io/name: webserver-{{ $providerName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webserver-{{ $providerName }}
        app.kubernetes.io/part-of: urban-platform-infra
    spec:
      serviceAccountName: {{ include "cip.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.global.serviceAccount.automountServiceAccountToken | default false }}
      enableServiceLinks: {{ .Values.global.enableServiceLinks | default false }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.global.scheduling.topologySpread }}
      topologySpreadConstraints:
        {{- include "cip.topologySpreadConstraints" (list . (printf "webserver-%s" $providerName)) | nindent 8 }}
      {{- end }}
      {{- with $provider.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webserver
          image: {{ include "cip.image" (list . $provider.image) | quote }}
          imagePullPolicy: {{ $provider.imagePullPolicy | default .Values.global.imagePullPolicy | quote }}
          {{- if $provider.securityContext }}
          securityContext:
            {{- toYaml $provider.securityContext | nindent 12 }}
          {{- end }}
          {{- with $provider.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- range $p := $provider.ports }}
            - name: {{ $p.name | quote }}
              containerPort: {{ $p.containerPort }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ (first $provider.ports).containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ (first $provider.ports).containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: webserver
  namespace: {{ include "cip.namespace" . }}
  labels:
    app.kubernetes.io/name: webserver-{{ $providerName }}
  {{- with .Values.webserver.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.webserver.service.type | default "ClusterIP" }}
  {{- with .Values.webserver.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    app.kubernetes.io/name: webserver-{{ $providerName }}
  ports:
    {{- range $p := $provider.ports }}
    - name: {{ $p.name | quote }}
      port: {{ $p.servicePort }}
      targetPort: {{ $p.containerPort }}
    {{- end }}
{{- if and .Values.ingress.enabled (.Values.webserver.ingress.enabled | default true) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webserver
  namespace: {{ include "cip.namespace" . }}
  annotations:
    {{- include "cip.ingressAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName | quote }}
      {{- if .Values.ingress.host }}
      hosts: [{{ .Values.ingress.host | quote }}]
      {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ .Values.webserver.ingress.path | default "/" | quote }}
            pathType: Prefix
            backend:
              service:
                name: webserver
                port:
                  number: {{ .Values.webserver.ingress.servicePort | default 80 }}
{{- end }}
{{- if and .Values.ingress.enabled (.Values.webserver.ingress.enabled | default true) (eq (.Values.ingress.className | default "traefik") "traefik") (or (.Values.ingress.sslRedirect | default true) (.Values.ingress.forceSslRedirect | default true)) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webserver-redirect
  namespace: {{ include "cip.namespace" . }}
  annotations:
    {{- include "cip.traefikHttpRedirectAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ .Values.webserver.ingress.path | default "/" | quote }}
            pathType: Prefix
            backend:
              service:
                name: webserver
                port:
                  number: {{ .Values.webserver.ingress.servicePort | default 80 }}
{{- end }}
{{- end }}
