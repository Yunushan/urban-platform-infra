{{- if .Values.zabbixAgent.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-agent2
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: zabbix-agent2
spec:
  replicas: {{ include "cip.replicaCount" (list . (.Values.zabbixAgent.replicas | default 3)) }}
  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix-agent2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbix-agent2
        app.kubernetes.io/part-of: urban-platform-infra
    spec:
      {{- include "cip.podSpecDefaults" . | nindent 6 }}
      {{- with .Values.zabbixAgent.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- else if .Values.global.podSecurityContext.enabled }}
      securityContext:
        {{- include "cip.podSecurityContext" . | nindent 8 }}
      {{- end }}
      containers:
        - name: zabbix-agent2
          image: {{ include "cip.image" (list . .Values.zabbixAgent.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          securityContext:
            {{- with .Values.zabbixAgent.securityContext }}
            {{- toYaml . | nindent 12 }}
            {{- else }}
            {{- include "cip.securityContext" . | nindent 12 }}
            {{- end }}
          ports:
            {{- range .Values.zabbixAgent.ports }}
            - name: {{ .name | quote }}
              containerPort: {{ .containerPort }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-agent2
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: zabbix-agent2
spec:
  selector:
    app.kubernetes.io/name: zabbix-agent2
  ports:
    {{- range .Values.zabbixAgent.ports }}
    - name: {{ .name | quote }}
      port: {{ .servicePort }}
      targetPort: {{ .containerPort }}
    {{- end }}
{{- end }}
