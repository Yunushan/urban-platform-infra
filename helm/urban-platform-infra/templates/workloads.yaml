{{- range $name, $svc := .Values.workloads }}
{{- if $svc.enabled }}
{{- $kind := default "Deployment" $svc.kind }}
---
apiVersion: apps/v1
kind: {{ $kind }}
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
  labels:
    {{- include "cip.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
    urban-platform.io/category: {{ $svc.category | default "application" | quote }}
spec:
  {{- if eq $kind "StatefulSet" }}
  serviceName: {{ $name }}-headless
  {{- end }}
  replicas: {{ include "cip.replicaCount" (list $ ($svc.replicas | default $.Values.global.defaultReplicas)) }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/part-of: urban-platform-infra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: urban-platform-infra
        urban-platform.io/category: {{ $svc.category | default "application" | quote }}
    spec:
      serviceAccountName: {{ include "cip.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.global.serviceAccount.automountServiceAccountToken | default false }}
      enableServiceLinks: {{ $.Values.global.enableServiceLinks | default false }}
      {{- if $.Values.global.podSecurityContext.enabled }}
      securityContext:
        {{- include "cip.podSecurityContext" $ | nindent 8 }}
      {{- end }}
      {{- if $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range $.Values.global.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if $.Values.global.scheduling.topologySpread }}
      topologySpreadConstraints:
        {{- include "cip.topologySpreadConstraints" (list $ $name) | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ $name }}
          image: {{ include "cip.image" (list $ $svc.image) | quote }}
          imagePullPolicy: {{ $svc.imagePullPolicy | default $.Values.global.imagePullPolicy | quote }}
          securityContext:
            {{- include "cip.securityContext" $ | nindent 12 }}
          {{- if $svc.env }}
          env:
            {{- toYaml $svc.env | nindent 12 }}
          {{- end }}
          {{- if $svc.ports }}
          ports:
            {{- range $p := $svc.ports }}
            {{- if $p.range }}
            {{- $rangeStart := int $p.range.start }}
            {{- $rangeEnd := int (add $p.range.end 1) }}
            {{- range $port := untilStep $rangeStart $rangeEnd 1 }}
            - name: {{ printf "%s-%d" ($p.range.namePrefix | default "tcp") $port | trunc 15 | trimSuffix "-" }}
              containerPort: {{ $port }}
              protocol: TCP
            {{- end }}
            {{- else }}
            - name: {{ $p.name | default (printf "tcp-%d" ($p.containerPort | int)) | quote }}
              containerPort: {{ $p.containerPort }}
              protocol: TCP
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if and $svc.probe $svc.probe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ $svc.probe.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $svc.probe.port }}
            initialDelaySeconds: 45
            periodSeconds: 20
          {{- end }}
          {{- if $svc.resources }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ $name }}
                topologyKey: kubernetes.io/hostname
{{- if and (eq $kind "StatefulSet") $svc.storage }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if $svc.storage.className }}
        storageClassName: {{ $svc.storage.className | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $svc.storage.size | default "10Gi" }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
  labels:
    {{- include "cip.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
  {{- with (dig "service" "annotations" dict $svc) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ dig "service" "type" "ClusterIP" $svc }}
  {{- with (dig "service" "loadBalancerSourceRanges" list $svc) }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: urban-platform-infra
  ports:
    {{- range $p := $svc.ports }}
    {{- if $p.range }}
    {{- $rangeStart := int $p.range.start }}
    {{- $rangeEnd := int (add $p.range.end 1) }}
    {{- range $port := untilStep $rangeStart $rangeEnd 1 }}
    - name: {{ printf "%s-%d" ($p.range.namePrefix | default "tcp") $port | trunc 15 | trimSuffix "-" }}
      port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
    {{- end }}
    {{- else }}
    - name: {{ $p.name | default (printf "tcp-%d" ($p.servicePort | int)) | quote }}
      port: {{ $p.servicePort | default $p.containerPort }}
      targetPort: {{ $p.containerPort }}
      protocol: TCP
    {{- end }}
    {{- end }}
{{- if eq $kind "StatefulSet" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-headless
  namespace: {{ include "cip.namespace" $ }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    {{- range $p := $svc.ports }}
    {{- if not $p.range }}
    - name: {{ $p.name | default (printf "tcp-%d" ($p.servicePort | int)) | quote }}
      port: {{ $p.servicePort | default $p.containerPort }}
      targetPort: {{ $p.containerPort }}
    {{- end }}
    {{- end }}
{{- end }}
{{- if and $.Values.autoscaling.enabled $svc.autoscaling.enabled (eq $kind "Deployment") }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $.Values.autoscaling.default.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.default.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.default.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
{{- if and $.Values.ingress.enabled $svc.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ include "cip.namespace" $ }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: {{ $.Values.ingress.sslRedirect | default true | quote }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: {{ $.Values.ingress.forceSslRedirect | default true | quote }}
    {{- with $.Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className | quote }}
  {{- if $.Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ $.Values.ingress.tls.secretName | quote }}
      {{- if $.Values.ingress.host }}
      hosts: [{{ $.Values.ingress.host | quote }}]
      {{- end }}
  {{- end }}
  rules:
    {{- if $.Values.ingress.host }}
    - host: {{ $.Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: {{ $svc.ingress.path | default (printf "/%s" $name) | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ (first $svc.ports).servicePort | default (first $svc.ports).containerPort }}
{{- end }}
{{- end }}
{{- end }}
