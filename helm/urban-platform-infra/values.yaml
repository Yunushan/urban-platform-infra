observability:
  profile: elasticsearch
  stack:
    name: elastic-eck-prometheus-grafana-opentelemetry
    logging: elasticsearch
    search: elasticsearch
    metrics: prometheus
    dashboards: grafana
    telemetry: opentelemetry
    traces: opentelemetry
  grafana:
    enabled: true
  prometheus:
    enabled: true
    provider: kube-prometheus-stack
  opentelemetry:
    enabled: true
    mode: daemonset
    collector:
      name: opentelemetry-collector
      namespace: observability
    signals:
      metrics: true
      logs: true
      traces: true
  loki:
    enabled: true
  elasticsearch:
    enabled: true
    mode: eck
    name: city-elasticsearch
    version: 9.4.0
    image:
      repository: docker.elastic.co/elasticsearch/elasticsearch
      tag: 9.4.0
    resources:
      requests:
        cpu: 250m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    nodeSets:
    - name: default
      count: 3
      storage: 100Gi
    service:
      type: NodePort
      port: 9200
      nodePort: 30920
      externalTrafficPolicy: Local
  kibana:
    enabled: true
    mode: eck
    version: 9.4.0
    image:
      repository: docker.elastic.co/kibana/kibana
      tag: 9.4.0
    count: 2
    port: 5601
    service:
      type: NodePort
      port: 5601
      nodePort: 30561
      externalTrafficPolicy: Local
  logstash:
    enabled: true
    replicas: 2
    image:
      repository: docker.elastic.co/logstash/logstash
      tag: 9.4.0
    ports:
    - name: beats
      containerPort: 5044
      servicePort: 5044
    - name: monitoring
      containerPort: 9600
      servicePort: 9600
  opensearch:
    enabled: false
    replicas: 3
  graylog:
    enabled: false
    replicas: 3
  clickhouse:
    enabled: true
    replicas: 3
monitoring:
  enabled: false
  prometheus:
    releaseLabel: kube-prometheus-stack
    ruleLabels: {}
  prometheusRules:
    enabled: true
    evaluationInterval: 1m
    runbookBaseUrl: https://example.com/runbooks/urban-platform
    severity:
      page: critical
      ticket: warning
  serviceMonitors:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    targets: []
  dashboards:
    enabled: false
    folder: urban-platform
