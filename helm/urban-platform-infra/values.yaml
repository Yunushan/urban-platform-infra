global:
  projectName: urban-platform-infra
  environment: production
  imageRegistry: ''
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  enableServiceLinks: false
  defaultReplicas: 3
  replicaOverride: null
  skipPlaceholderWorkloads: false
  serviceAccount:
    create: true
    name: ''
    automountServiceAccountToken: false
  cluster:
    engine: rke2
    nodes: 3
    defaultOs: ubuntu-24.04
    vip: 192.0.2.10
    domain: urban-platform.example
  security:
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  scheduling:
    topologySpread: true
    antiAffinity: preferred
namespace:
  create: true
  name: urban-platform
  podSecurity:
    enforce: baseline
    audit: restricted
    warn: restricted
    version: latest
ingress:
  enabled: true
  className: traefik
  host: ''
  annotations: {}
  sourceAllowList:
    enabled: false
    cidrs: []
    cidrsText: ''
  sslRedirect: true
  forceSslRedirect: true
  tls:
    enabled: true
    secretName: urban-platform-tls
    createSecret: true
    certManager:
      enabled: true
      issuerName: ''
      issuerKind: Issuer
      issuerGroup: cert-manager.io
      duration: 87600h
      renewBefore: 720h
    selfSigned:
      enabled: true
      durationDays: 3650
    certificate:
      crt: ''
      key: ''
secretManagement:
  enabled: false
  provider: external-secrets
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  externalSecrets:
    registryCredentials:
      enabled: false
      targetName: registry-credentials
      type: kubernetes.io/dockerconfigjson
      creationPolicy: Owner
      immutable: true
      data:
      - secretKey: .dockerconfigjson
        remoteRef:
          key: example/urban-platform/registry/dockerconfigjson
    ingressTls:
      enabled: false
      targetName: urban-platform-tls
      type: kubernetes.io/tls
      creationPolicy: Owner
      immutable: false
      data:
      - secretKey: tls.crt
        remoteRef:
          key: example/urban-platform/ingress/tls
          property: tls.crt
      - secretKey: tls.key
        remoteRef:
          key: example/urban-platform/ingress/tls
          property: tls.key
autoscaling:
  enabled: true
  default:
    minReplicas: 3
    maxReplicas: 9
    targetCPUUtilizationPercentage: 70
networkPolicy:
  enabled: true
  defaultDeny:
    enabled: true
  sameNamespace:
    enabled: true
  ingress:
    enabled: true
    namespaces:
    - kube-system
    - ingress-nginx
  cloudnativePgOperator:
    enabled: true
    namespace: cnpg-system
    ports:
    - 8000
    - 5432
  eckOperator:
    enabled: true
    namespace: elastic-system
    ports:
    - 9200
  dns:
    enabled: true
    namespace: kube-system
    podLabels:
      k8s-app: kube-dns
  kubernetesApi:
    enabled: true
    cidrs:
    - 0.0.0.0/0
    ports:
    - 443
    - 6443
  externalWeb:
    enabled: true
    cidrs:
    - 0.0.0.0/0
    ports:
    - 80
    - 443
webserver:
  provider: nginx
  ingress:
    enabled: false
    path: /
    servicePort: 80
  service:
    type: ClusterIP
    annotations: {}
    loadBalancerSourceRanges: []
  providers:
    nginx:
      enabled: true
      displayName: nginx
      image:
        repository: nginxinc/nginx-unprivileged
        tag: '1.30.0'
      podSecurityContext:
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        capabilities:
          drop:
          - ALL
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
      replicas: 3
      ports:
      - name: http
        containerPort: 8080
        servicePort: 80
      configTemplate: nginx.conf
    apache-httpd:
      enabled: false
      displayName: Apache HTTP Server
      image:
        repository: httpd
        tag: '2.4'
      replicas: 3
      ports:
      - name: http
        containerPort: 80
        servicePort: 80
      - name: https
        containerPort: 443
        servicePort: 443
      configTemplate: httpd.conf
    apache-tomcat:
      enabled: false
      displayName: Apache Tomcat
      image:
        repository: tomcat
        tag: '10.1'
      replicas: 3
      ports:
      - name: http
        containerPort: 8080
        servicePort: 80
      configTemplate: server.xml
    traefik:
      enabled: false
      displayName: Traefik
      image:
        repository: traefik
        tag: v3.1
      replicas: 3
      ports:
      - name: web
        containerPort: 80
        servicePort: 80
      - name: websecure
        containerPort: 443
        servicePort: 443
      - name: dashboard
        containerPort: 8080
        servicePort: 8080
      configTemplate: traefik.yaml
messaging:
  kafka:
    enabled: true
    replicas: 3
    image:
      repository: confluentinc/cp-kafka
      tag: 7.9.6
    storage:
      size: 50Gi
      className: ''
    ports:
      client: 9092
      external: 29092
      jmx: 29094
    zookeeper:
      enabled: true
      replicas: 3
      image:
        repository: confluentinc/cp-zookeeper
        tag: 7.9.6
      storage:
        size: 10Gi
        className: ''
    ui:
      enabled: true
      replicas: 2
      image:
        repository: provectuslabs/kafka-ui
        tag: v0.7.2
      port: 8080
  redis:
    enabled: true
    replicas: 3
    image:
      repository: redis
      tag: '8.6.2'
    sentinel:
      enabled: true
      replicas: 3
      port: 26379
