global:
  projectName: urban-platform-infra
  environment: production
  imageRegistry: ''
  imagePullSecrets: []
  imagePullPolicy: IfNotPresent
  enableServiceLinks: false
  defaultReplicas: 1
  replicaOverride: 1
  skipPlaceholderWorkloads: true
  serviceAccount:
    create: true
    name: ''
    automountServiceAccountToken: false
  cluster:
    engine: rke2
    nodes: 3
    defaultOs: ubuntu-24.04
    vip: 192.0.2.10
    domain: urban-platform.example
  security:
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  podSecurityContext:
    enabled: true
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  scheduling:
    topologySpread: false
    antiAffinity: preferred
imagePromotionController:
  enabled: false
  profile: disabled
  executionMode: plan
  imageMode: registry
  registry: ''
  imagePullSecret: registry-credentials
  credentialSource: external-secret
  requireDigestPins: true
  requireVulnerabilityScan: true
  requireSbom: true
  requireSignatureOrAttestation: true
  requirePromotionRecord: true
  reports:
    controller: reports/registry-promotion-controller.md
    overrides: reports/registry-promotion-values.yaml
runtimeHardening:
  enabled: false
  profile: disabled
  enforcementMode: audit
  policyEngine: none
  podSecurity:
    targetEnforce: baseline
    targetAudit: restricted
    targetWarn: restricted
    requirePinnedVersion: true
  workloadSecurity:
    requireRunAsNonRoot: true
    requireReadOnlyRootFilesystem: false
    requireRuntimeDefaultSeccomp: true
    requireDropAllCapabilities: true
    disallowPrivilegeEscalation: true
    disallowHostNamespaces: true
  images:
    requireDigestPins: false
    requireSignatureVerification: false
    allowedRegistries: []
    deniedTags:
    - latest
    - latest-pg16
    - latest-pg17
    - latest-pg18
  reports:
    plan: reports/runtime-hardening-plan.md
    overrides: reports/runtime-hardening-values.yaml
gitOpsDelivery:
  enabled: false
  profile: operator-managed
  controller: none
  reconciliation: manual
  driftDetection: report-only
  prune: false
  selfHeal: false
  source:
    repoURL: https://git.example.invalid/platform/urban-platform-infra.git
    targetRevision: main
    path: helm/urban-platform-infra
    valueFiles:
    - values.yaml
  reports:
    plan: reports/gitops-delivery-plan.md
    overrides: reports/gitops-delivery-values.yaml
progressiveDelivery:
  enabled: false
  profile: disabled
  strategy: rolling-update
  controller: none
  trafficProvider: native
  analysis:
    enabled: false
    mode: disabled
    metrics: []
  canary:
    enabled: false
    steps: []
    maxUnavailable: 25%
    maxSurge: 25%
  blueGreen:
    enabled: false
    previewService: false
    autoPromotion: false
  rollback:
    automatic: false
    requireSmokeTests: true
    requireRollbackDrill: false
  reports:
    plan: reports/progressive-delivery-plan.md
    overrides: reports/progressive-delivery-values.yaml
scalingPolicy:
  enabled: false
  profile: disabled
  mode: disabled
  metricsSource: none
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  vpa:
    enabled: false
    updateMode: "Off"
  keda:
    enabled: false
    triggers: []
  clusterAutoscaler:
    enabled: false
    mode: external
  rightSizing:
    enabled: false
    capacityUtilizationLimit: '0.70'
    requireRequests: true
  reports:
    plan: reports/scaling-policy-plan.md
    overrides: reports/scaling-policy-values.yaml
networkConnectivity:
  enabled: false
  profile: disabled
  mode: baseline
  ingressClassName: traefik
  networkPolicy:
    enabled: true
    profile: existing-defaults
    defaultDeny: true
    dnsEgress: true
    kubernetesApiEgress: true
    externalWebEgress: true
  serviceMesh:
    enabled: false
    provider: none
    mtlsMode: disabled
    trafficPolicy: disabled
  egress:
    mode: existing-rules
    requireExplicitCidrs: false
  dns:
    provider: kube-dns
    namespace: kube-system
  tls:
    mode: ingress-secret
    requireTrustedIssuer: false
  reports:
    plan: reports/network-connectivity-plan.md
    overrides: reports/network-connectivity-values.yaml
accessGovernance:
  enabled: false
  profile: disabled
  mode: baseline
  rbac:
    enabled: false
    strategy: existing-serviceaccount
    requireLeastPrivilege: false
    serviceAccountTokenAutomount: false
  identity:
    enabled: false
    provider: none
    requireMfa: false
    requireGroupMapping: false
  audit:
    enabled: false
    mode: platform-default
    requireAuditPolicy: false
  breakGlass:
    enabled: false
    requireTimeBoxedAccess: true
    requireReview: false
  tenantIsolation:
    enabled: false
    mode: single-namespace
    requireNamespaceContract: false
  reports:
    plan: reports/access-governance-plan.md
    overrides: reports/access-governance-values.yaml
complianceEvidence:
  enabled: false
  profile: disabled
  mode: baseline
  evidence:
    collectReports: false
    requirePrivateIndex: false
    requireReleaseTag: false
    requireControlMap: false
    requireRestoreDrill: false
    requireAccessReview: false
    requireIncidentDrill: false
  retention:
    enabled: false
    days: 0
    storageTier: none
  packaging:
    enabled: false
    format: report-only
    includeChecksums: false
    includeAttestations: false
  reports:
    plan: reports/compliance-evidence-plan.md
    overrides: reports/compliance-evidence-values.yaml
incidentResponse:
  enabled: false
  profile: disabled
  mode: baseline
  severityModel: none
  alerting:
    enabled: false
    requireAlertRoutes: false
    requirePaging: false
    requireQuietHours: false
  runbooks:
    enabled: false
    requireRunbookIndex: false
    requireServiceOwnership: false
    requireRollbackSteps: false
  communications:
    enabled: false
    requireCommsTemplate: false
    requireStakeholderMap: false
  drills:
    enabled: false
    requireIncidentDrill: false
    requirePostIncidentReview: false
  evidence:
    enabled: false
    requireTimeline: false
    requireActionItems: false
  reports:
    plan: reports/incident-response-plan.md
    overrides: reports/incident-response-values.yaml
changeManagement:
  enabled: false
  profile: disabled
  mode: baseline
  approvalModel: none
  changeControl:
    enabled: false
    requireChangeTicket: false
    requireApprovals: false
    requireRiskAssessment: false
    requireImpactAssessment: false
  maintenanceWindow:
    enabled: false
    requireWindow: false
    requireFreezeCheck: false
    requireStakeholderNotice: false
  rollout:
    enabled: false
    requireRollbackPlan: false
    requireSmokeTests: false
    requirePostChangeReview: false
  evidence:
    enabled: false
    requireChangeRecord: false
    requireDeploymentEvidence: false
    requireApprovalEvidence: false
  reports:
    plan: reports/change-management-plan.md
    overrides: reports/change-management-values.yaml
cutoverGates:
  enabled: false
  profile: disabled
  mode: baseline
  trafficSwitch:
    enabled: false
    method: none
    requireIngressHost: false
    requireDnsTlsEvidence: false
  preCutover:
    requireImportPreflight: false
    requireCapacityReport: false
    requireReleaseEvidence: false
    requireRegistryEvidence: false
    requireBackupRestoreEvidence: false
    requireDatabaseRestoreEvidence: false
    requireChangeTicket: false
    requireApprovalEvidence: false
  smokeTests:
    enabled: false
    requireSmokeTestPlan: false
    requirePostMigrationCheck: false
    requireSyntheticChecks: false
  rollback:
    enabled: false
    requireRollbackPlan: false
    requireRecoveryPlan: false
    requireRestorePoint: false
  postCutover:
    enabled: false
    requireObservationWindow: false
    requireOwnerHandoff: false
  reports:
    plan: reports/cutover-gate-plan.md
    overrides: reports/cutover-gate-values.yaml
smokeTesting:
  enabled: false
  profile: disabled
  mode: baseline
  execution:
    enabled: false
    runner: none
    namespace: urban-platform
    serviceAccountName: ''
  probes:
    kubernetesRollout: false
    httpRoutes: false
    tcpServices: false
    databaseConnections: false
    messagingConnections: false
    externalSynthetic: false
  evidence:
    requirePlan: false
    requireResults: false
    requireOwnerReview: false
  reports:
    plan: reports/smoke-test-plan.md
    overrides: reports/smoke-test-values.yaml
releaseRunbook:
  enabled: false
  profile: disabled
  mode: baseline
  execution:
    enabled: false
    publisher: none
    deployer: none
  gates:
    requireReleaseTag: false
    requireCleanWorktree: false
    requireArtifactEvidence: false
    requireSbom: false
    requireChecksums: false
    requireAttestation: false
    requireChangeApproval: false
    requireSmokeTestPlan: false
    requireCutoverGate: false
    requireRollbackPlan: false
  evidence:
    requirePublicBundle: false
    requirePrivateApprovalIndex: false
    requireOwnerReview: false
  reports:
    plan: reports/release-runbook-plan.md
    overrides: reports/release-runbook-values.yaml
clusterUpgrade:
  enabled: false
  profile: disabled
  mode: baseline
  engine: rke2
  orchestration:
    enabled: false
    strategy: none
    drainNodes: false
    restartServices: false
  versions:
    currentKubernetes: ''
    targetKubernetes: ''
    currentRke2: ''
    targetRke2: ''
    maxMinorSkew: 0
  gates:
    requirePinnedVersion: false
    requireSupportedSkew: false
    requireEtcdSnapshot: false
    requireBackupRestore: false
    requireMaintenanceWindow: false
    requireCapacityHeadroom: false
    requireNodeHealth: false
    requireRollbackPlan: false
    requireAddOnCompatibility: false
    requirePostUpgradeSmokeTest: false
  evidence:
    requireClusterDoctor: false
    requireInventoryReview: false
    requireReleaseNotesReview: false
    requireOwnerApproval: false
  reports:
    plan: reports/cluster-upgrade-plan.md
    overrides: reports/cluster-upgrade-values.yaml
disasterRecovery:
  enabled: false
  profile: disabled
  mode: baseline
  tier: none
  failoverModel: none
  recoveryObjectives:
    enabled: false
    requireRtoRpo: false
    requireDependencyMap: false
    requireCriticalityMap: false
  replication:
    enabled: false
    requireBackupReplication: false
    requireDataReplication: false
    requireCrossZonePlacement: false
  restoreDrills:
    enabled: false
    requireDatabaseRestore: false
    requireEtcdRestore: false
    requireNamespaceRestore: false
    requireApplicationSmokeTest: false
  continuity:
    enabled: false
    requireRunbook: false
    requireCommsPlan: false
    requireManualWorkaround: false
    requireSupplierContacts: false
  evidence:
    enabled: false
    requireDrillEvidence: false
    requireRtoEvidence: false
    requirePostDrillReview: false
  reports:
    plan: reports/disaster-recovery-plan.md
    overrides: reports/disaster-recovery-values.yaml
namespace:
  create: true
  name: urban-platform
  podSecurity:
    enforce: baseline
    audit: restricted
    warn: restricted
    version: latest
  limitRange:
    enabled: true
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 50m
      memory: 128Mi
  resourceQuota:
    enabled: true
    hard:
      requests.cpu: '6'
      requests.memory: 8Gi
      limits.cpu: '10'
      limits.memory: 10Gi
      requests.storage: 80Gi
      persistentvolumeclaims: '60'
      pods: '160'
storageTiers:
  hot:
    enabled: false
    storageClassName: ''
    description: Active low-latency PVCs for databases, Kafka, Redis, and stateful workloads.
  warm:
    enabled: false
    storageClassName: ''
    description: Lower-cost PVCs for compressed history and medium-retention analytics.
  cold:
    enabled: false
    storageClassName: ''
    description: Archive tier for backups, database dumps, old logs, and release evidence.
    objectStore:
      enabled: false
      provider: s3-compatible
      bucket: ''
      prefix: urban-platform
      secretRef:
        name: ''
        namespace: ''
        accessKeyIdKey: accessKeyId
        secretAccessKeyKey: secretAccessKey
backup:
  enabled: false
  profile: disabled
  velero:
    enabled: false
    installOperator: false
    provider: aws
    bucket: ''
    prefix: urban-platform
    secretRef:
      name: ''
      namespace: velero
    snapshotsEnabled: false
    nodeAgentEnabled: false
    schedule:
      enabled: false
      name: daily-platform-backup
      cron: "0 2 * * *"
      ttl: 720h0m0s
  rke2Etcd:
    enabled: false
    schedule: ''
    retention: 7
  imageArchives:
    enabled: false
    retention: 7d
  externalProviders:
    urbackup:
      enabled: false
      mode: external
      installInCluster: false
      endpoint: ''
      secretRef:
        name: ''
        namespace: ''
      scope:
        hostImageBackups: false
        fileBackups: false
        legacyComposeBackups: false
        databasePluginBackups: false
    restic:
      enabled: false
      mode: operator-artifacts
      repository: ''
      secretRef:
        name: ''
        namespace: ''
      paths:
      - /var/lib/urban-platform/private
    kopia:
      enabled: false
      mode: operator-artifacts
      repository: ''
      secretRef:
        name: ''
        namespace: ''
    borg:
      enabled: false
      mode: operator-artifacts
      repository: ''
      secretRef:
        name: ''
        namespace: ''
ingress:
  enabled: true
  className: traefik
  host: ''
  annotations: {}
  sourceAllowList:
    enabled: false
    cidrs: []
    cidrsText: ''
  sslRedirect: true
  forceSslRedirect: true
  tls:
    enabled: true
    secretName: urban-platform-tls
    createSecret: true
    certManager:
      enabled: true
      issuerName: ''
      issuerKind: Issuer
      issuerGroup: cert-manager.io
      duration: 87600h
      renewBefore: 720h
    selfSigned:
      enabled: true
      durationDays: 3650
    certificate:
      crt: ''
      key: ''
secretManagement:
  enabled: false
  provider: external-secrets
  refreshInterval: 1h
  providerAdapters:
    kubernetesDirect:
      enabled: false
      automaticImport: true
      rendersPlainKubernetesSecrets: true
      requiredGate: MIGRATION_ALLOW_SECRET_MATERIAL=true
    externalSecrets:
      enabled: false
      automaticImport: true
      rendersPlainKubernetesSecrets: false
      requiredOperator: external-secrets-operator
    vault:
      enabled: false
      automaticImport: true
      rendersPlainKubernetesSecrets: false
      requiredOperator: external-secrets-operator
    sops:
      enabled: false
      automaticImport: false
      rendersPlainKubernetesSecrets: false
      encryptedPath: secrets/
    sealedSecrets:
      enabled: false
      automaticImport: false
      rendersPlainKubernetesSecrets: false
      requiredOperator: sealed-secrets-controller
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  externalSecrets:
    registryCredentials:
      enabled: false
      targetName: registry-credentials
      type: kubernetes.io/dockerconfigjson
      creationPolicy: Owner
      immutable: true
      data:
      - secretKey: .dockerconfigjson
        remoteRef:
          key: example/urban-platform/registry/dockerconfigjson
    ingressTls:
      enabled: false
      targetName: urban-platform-tls
      type: kubernetes.io/tls
      creationPolicy: Owner
      immutable: false
      data:
      - secretKey: tls.crt
        remoteRef:
          key: example/urban-platform/ingress/tls
          property: tls.crt
      - secretKey: tls.key
        remoteRef:
          key: example/urban-platform/ingress/tls
          property: tls.key
autoscaling:
  enabled: false
  default:
    minReplicas: 3
    maxReplicas: 9
    targetCPUUtilizationPercentage: 70
networkPolicy:
  enabled: true
  defaultDeny:
    enabled: true
  sameNamespace:
    enabled: true
  ingress:
    enabled: true
    namespaces:
    - kube-system
    - ingress-nginx
  cloudnativePgOperator:
    enabled: true
    namespace: cnpg-system
    ports:
    - 8000
    - 5432
  eckOperator:
    enabled: true
    namespace: elastic-system
    ports:
    - 9200
  dns:
    enabled: true
    namespace: kube-system
    podLabels:
      k8s-app: kube-dns
  kubernetesApi:
    enabled: true
    cidrs:
    - 0.0.0.0/0
    ports:
    - 443
    - 6443
  externalWeb:
    enabled: true
    cidrs:
    - 0.0.0.0/0
    ports:
    - 80
    - 443
webserver:
  provider: nginx
  ingress:
    enabled: false
    path: /
    servicePort: 80
  service:
    type: ClusterIP
    annotations: {}
    loadBalancerSourceRanges: []
  providers:
    nginx:
      enabled: true
      displayName: nginx
      image:
        repository: nginxinc/nginx-unprivileged
        tag: '1.30.2'
      podSecurityContext:
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        capabilities:
          drop:
          - ALL
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
      replicas: 3
      ports:
      - name: http
        containerPort: 8080
        servicePort: 80
      configTemplate: nginx.conf
    apache-httpd:
      enabled: false
      displayName: Apache HTTP Server
      image:
        repository: httpd
        tag: '2.4'
      replicas: 3
      ports:
      - name: http
        containerPort: 80
        servicePort: 80
      - name: https
        containerPort: 443
        servicePort: 443
      configTemplate: httpd.conf
    apache-tomcat:
      enabled: false
      displayName: Apache Tomcat
      image:
        repository: tomcat
        tag: '10.1'
      replicas: 3
      ports:
      - name: http
        containerPort: 8080
        servicePort: 80
      configTemplate: server.xml
    traefik:
      enabled: false
      displayName: Traefik
      image:
        repository: traefik
        tag: v3.7.1
      replicas: 3
      ports:
      - name: web
        containerPort: 80
        servicePort: 80
      - name: websecure
        containerPort: 443
        servicePort: 443
      - name: dashboard
        containerPort: 8080
        servicePort: 8080
      configTemplate: traefik.yaml
messaging:
  kafka:
    enabled: true
    replicas: 1
    image:
      repository: confluentinc/cp-kafka
      tag: 7.9.6
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storage:
      size: 2Gi
      className: ''
    ports:
      client: 9092
      external: 29092
      jmx: 29094
    zookeeper:
      enabled: true
      replicas: 1
      image:
        repository: confluentinc/cp-zookeeper
        tag: 7.9.6
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storage:
        size: 1Gi
        className: ''
    ui:
      enabled: true
      replicas: 1
      image:
        repository: provectuslabs/kafka-ui
        tag: v0.7.2
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
      port: 8080
  redis:
    enabled: true
    replicas: 1
    image:
      repository: redis
      tag: '8.6.2'
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    sentinel:
      enabled: false
      replicas: 1
      port: 26379
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    port: 6379
    storage:
      size: 1Gi
      className: ''
