{{- if .Values.global.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cip.serviceAccountName" . }}
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.global.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
