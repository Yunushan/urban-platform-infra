{{- if and .Values.secretManagement.enabled (eq .Values.secretManagement.provider "external-secrets") }}
{{- range $name, $secret := .Values.secretManagement.externalSecrets }}
{{- if $secret.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name | quote }}
  namespace: {{ include "cip.namespace" $ }}
  labels:
    {{- include "cip.labels" $ | nindent 4 }}
    city-intersection.io/secret-delivery: external-secrets
spec:
  refreshInterval: {{ $.Values.secretManagement.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $.Values.secretManagement.secretStoreRef.name | quote }}
    kind: {{ $.Values.secretManagement.secretStoreRef.kind | quote }}
  target:
    name: {{ $secret.targetName | quote }}
    creationPolicy: {{ $secret.creationPolicy | default "Owner" | quote }}
    immutable: {{ $secret.immutable | default false }}
    template:
      type: {{ $secret.type | default "Opaque" | quote }}
  data:
    {{- range $secret.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ .remoteRef.key | quote }}
        {{- with .remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
        {{- with .remoteRef.version }}
        version: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
