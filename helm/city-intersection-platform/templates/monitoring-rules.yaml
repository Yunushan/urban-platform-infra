{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRules.enabled }}
{{- $namespace := include "cip.namespace" . -}}
{{- $runbooks := .Values.monitoring.prometheusRules.runbookBaseUrl | trimSuffix "/" -}}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: city-intersection-slo
  namespace: {{ $namespace }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: city-intersection-slo
    release: {{ .Values.monitoring.prometheus.releaseLabel | quote }}
    {{- with .Values.monitoring.prometheus.ruleLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: city-intersection.slo.availability
      interval: {{ .Values.monitoring.prometheusRules.evaluationInterval | default "1m" | quote }}
      rules:
        - alert: CityIntersectionDeploymentReplicasUnavailable
          expr: |
            kube_deployment_status_replicas_available{namespace="{{ $namespace }}",deployment=~"app-[0-9]{2}|webserver-.*|logstash|kafka-ui|zabbix-agent2"} < kube_deployment_spec_replicas{namespace="{{ $namespace }}",deployment=~"app-[0-9]{2}|webserver-.*|logstash|kafka-ui|zabbix-agent2"}
          for: 10m
          labels:
            severity: {{ .Values.monitoring.prometheusRules.severity.ticket | default "warning" | quote }}
            slo: availability
            team: platform
          annotations:
            summary: "City Intersection deployment replicas unavailable"
            description: "A deployment has fewer available replicas than desired for more than 10 minutes."
            runbook_url: {{ printf "%s/deployment-replicas-unavailable" $runbooks | quote }}
        - alert: CityIntersectionStatefulSetReplicasUnavailable
          expr: |
            kube_statefulset_status_replicas_ready{namespace="{{ $namespace }}",statefulset=~"kafka|zookeeper|redis"} < kube_statefulset_replicas{namespace="{{ $namespace }}",statefulset=~"kafka|zookeeper|redis"}
          for: 10m
          labels:
            severity: {{ .Values.monitoring.prometheusRules.severity.page | default "critical" | quote }}
            slo: availability
            team: platform
          annotations:
            summary: "City Intersection stateful replicas unavailable"
            description: "A stateful dependency has fewer ready replicas than desired for more than 10 minutes."
            runbook_url: {{ printf "%s/statefulset-replicas-unavailable" $runbooks | quote }}
        - alert: CityIntersectionContainerRestartingTooOften
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ $namespace }}",container!="POD"}[15m]) > 3
          for: 5m
          labels:
            severity: {{ .Values.monitoring.prometheusRules.severity.ticket | default "warning" | quote }}
            slo: stability
            team: platform
          annotations:
            summary: "City Intersection container restart rate is elevated"
            description: "A container restarted more than three times in 15 minutes."
            runbook_url: {{ printf "%s/container-restarts" $runbooks | quote }}
        - alert: CityIntersectionHPASaturated
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="{{ $namespace }}"} >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="{{ $namespace }}"}
          for: 15m
          labels:
            severity: {{ .Values.monitoring.prometheusRules.severity.ticket | default "warning" | quote }}
            slo: capacity
            team: platform
          annotations:
            summary: "City Intersection HPA is saturated"
            description: "An HPA has run at maximum replicas for at least 15 minutes."
            runbook_url: {{ printf "%s/hpa-saturated" $runbooks | quote }}
        - alert: CityIntersectionPersistentVolumeFilling
          expr: |
            (kubelet_volume_stats_available_bytes{namespace="{{ $namespace }}"} / kubelet_volume_stats_capacity_bytes{namespace="{{ $namespace }}"}) < 0.15
          for: 15m
          labels:
            severity: {{ .Values.monitoring.prometheusRules.severity.page | default "critical" | quote }}
            slo: data
            team: platform
          annotations:
            summary: "City Intersection persistent volume capacity is low"
            description: "A persistent volume has less than 15 percent capacity available."
            runbook_url: {{ printf "%s/persistent-volume-filling" $runbooks | quote }}
{{- end }}
