{{- if .Values.observability.logstash.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
spec:
  replicas: {{ include "cip.replicaCount" (list . (.Values.observability.logstash.replicas | default 2)) }}
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logstash
        app.kubernetes.io/part-of: city-intersection-project
    spec:
      {{- include "cip.podSpecDefaults" . | nindent 6 }}
      containers:
        - name: logstash
          image: {{ include "cip.image" (list . .Values.observability.logstash.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          ports:
            {{- range .Values.observability.logstash.ports }}
            - name: {{ .name | quote }}
              containerPort: {{ .containerPort }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: 5044
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: {{ include "cip.namespace" . }}
  labels:
    {{- include "cip.labels" . | nindent 4 }}
    app.kubernetes.io/name: logstash
spec:
  selector:
    app.kubernetes.io/name: logstash
  ports:
    {{- range .Values.observability.logstash.ports }}
    - name: {{ .name | quote }}
      port: {{ .servicePort }}
      targetPort: {{ .containerPort }}
    {{- end }}
{{- end }}
